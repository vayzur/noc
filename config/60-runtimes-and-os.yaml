# Language ecosystems, runtimes, and operating systems.
runtime-defaults: &runtime_defaults
  group: "Runtimes & OS"
  interval: 60s
  client:
    timeout: 10s
  headers:
    User-Agent: "tech-connectivity-monitor/1.0"
    Accept: "*/*"
  conditions:
    - "[STATUS] >= 200"
    - "[STATUS] < 400"

endpoints:
  - name: python
    <<: *runtime_defaults
    url: https://www.python.org/

  - name: python-devguide
    <<: *runtime_defaults
    url: https://devguide.python.org/

  - name: nodejs
    <<: *runtime_defaults
    url: https://nodejs.org/

  - name: go
    <<: *runtime_defaults
    url: https://go.dev/

  - name: rust
    <<: *runtime_defaults
    url: https://www.rust-lang.org/

  - name: php
    <<: *runtime_defaults
