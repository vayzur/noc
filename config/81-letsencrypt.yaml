# Let's Encrypt domains and certificate infrastructure.
letsencrypt-defaults: &letsencrypt_defaults
  group: "Let's Encrypt"
  interval: 60s
  client:
    timeout: 10s
  headers:
    User-Agent: "tech-connectivity-monitor/1.0"
    Accept: "*/*"
  conditions:
    - "[STATUS] >= 200"
    - "[STATUS] < 500"

endpoints:
  - name: letsencrypt-org
    <<: *letsencrypt_defaults
    url: https://letsencrypt.org/

  - name: letsencrypt-prod
    <<: *letsencrypt_defaults
    url: https://acme-v02.api.letsencrypt.org/directory

  - name: letsencrypt-staging
    <<: *letsencrypt_defaults
    url: https://acme-staging-v02.api.letsencrypt.org/directory
