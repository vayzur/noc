# Let's Encrypt domains and certificate infrastructure.
letsencrypt-core-defaults: &letsencrypt_core_defaults
  group: "Let's Encrypt"
  interval: 60s
  client:
    timeout: 10s
  headers:
    User-Agent: "tech-connectivity-monitor/1.0"
    Accept: "*/*"
  conditions:
    - "[STATUS] >= 200"
    - "[STATUS] < 400"

letsencrypt-crl-prod-defaults: &letsencrypt_crl_prod_defaults
  group: "Let's Encrypt"
  interval: 60s
  client:
    timeout: 10s
  headers:
    User-Agent: "tech-connectivity-monitor/1.0"
    Accept: "*/*"
  conditions:
    - "[STATUS] >= 200"
    - "[STATUS] < 500"

letsencrypt-staging-defaults: &letsencrypt_staging_defaults
  group: "Let's Encrypt"
  interval: 60s
  client:
    timeout: 10s
  headers:
    User-Agent: "tech-connectivity-monitor/1.0"
    Accept: "*/*"
  conditions:
    - "[STATUS] >= 200"
    - "[STATUS] < 500"

endpoints:
  - name: letsencrypt-org
    <<: *letsencrypt_core_defaults
    url: https://letsencrypt.org/

  - name: letsencrypt-community
    <<: *letsencrypt_core_defaults
    url: https://community.letsencrypt.org/

  - name: letsencrypt-acme-v2
    <<: *letsencrypt_core_defaults
    url: https://acme-v02.api.letsencrypt.org/directory

  - name: letsencrypt-acme-staging-v2
    <<: *letsencrypt_staging_defaults
    url: https://acme-staging-v02.api.letsencrypt.org/directory

  - name: le-crl-x1
    <<: *letsencrypt_crl_prod_defaults
    url: https://x1.c.lencr.org/

